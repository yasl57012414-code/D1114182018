<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>AI 遊戲整合版</title>

<!-- CSS 直接寫在裡面 -->
<style>
body {
    text-align: center;
    font-family: Arial;
    background: #eef;
}

#logo {
    width: 120px;
    margin-top: 10px;
}

#gameArea {
    width: 90%;
    height: 400px;
    margin: auto;
    border: 3px solid black;
    position: relative;
    background: white;
}

#box {
    width: 70px;
    height: 70px;
    background: red;
    position: absolute;
    cursor: pointer;
}

button {
    padding: 10px 20px;
    font-size: 16px;
}
</style>

</head>
<body>

<!-- LOGO（直接用圖片檔） -->
<img src="logo.png" id="logo">
<h1>AI 點擊遊戲</h1>

<p>分數：<span id="score">0</span></p>
<button onclick="startGame()">開始遊戲</button>

<div id="gameArea">
    <div id="box"></div>
</div>

<!-- JS 也寫在裡面 -->
<script>
let score = 0;
let started = false;

const box = document.getElementById("box");

function moveBox() {
    let area = document.getElementById("gameArea");

    let x = Math.random() * (area.clientWidth - 70);
    let y = Math.random() * (area.clientHeight - 70);

    box.style.left = x + "px";
    box.style.top = y + "px";
}

function startGame() {
    score = 0;
    started = true;
    document.getElementById("score").innerText = score;
    moveBox();
}

box.addEventListener("click", () => {
    if (!started) return;

    score++;
    document.getElementById("score").innerText = score;
    moveBox();
});
</script>

</body>
</html>

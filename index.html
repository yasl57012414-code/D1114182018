<h1>AI 點擊遊戲</h1>

<p>分數：<span id="score">0</span></p>
<button onclick="startGame()">開始遊戲</button>

<div id="gameArea">
    <div id="box"></div>
</div>

<!-- JS 也寫在裡面 -->
<script>
let score = 0;
let started = false;

const box = document.getElementById("box");

function moveBox() {
    let area = document.getElementById("gameArea");

    let x = Math.random() * (area.clientWidth - 70);
    let y = Math.random() * (area.clientHeight - 70);

    box.style.left = x + "px";
    box.style.top = y + "px";
}

function startGame() {
    score = 0;
    started = true;
    document.getElementById("score").innerText = score;
    moveBox();
}

box.addEventListener("click", () => {
    if (!started) return;

    score++;
    document.getElementById("score").innerText = score;
    moveBox();
});
</script>
